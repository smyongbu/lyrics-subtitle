name: Build macOS App

# 手动触发（Actions 页点 "Run workflow"），或推送 v 开头的 tag 时自动构建
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-macos:
    # Apple 芯片(arm64)运行器，产出 arm64 原生 .app（仅 M 系列 Mac 可运行）
    runs-on: macos-14

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python (arm64)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: 安装 arm64 ffmpeg 并打包其依赖库
        run: |
          set -e
          brew install ffmpeg dylibbundler

          mkdir -p ffmpeg_bundle
          cp "$(brew --prefix ffmpeg)/bin/ffmpeg" ffmpeg_bundle/ffmpeg
          chmod +x ffmpeg_bundle/ffmpeg

          # 递归收集 ffmpeg 依赖的 dylib，复制到 libs/ 并把引用改写为 @executable_path/libs
          dylibbundler -b -of -cd \
            -x ffmpeg_bundle/ffmpeg \
            -d ffmpeg_bundle/libs \
            -p @executable_path/libs \
            -s /opt/homebrew/lib

          # arm64 强制签名：改写过 load commands 的二进制/动态库必须重新 ad-hoc 签名才能加载
          codesign --force -s - ffmpeg_bundle/ffmpeg
          find ffmpeg_bundle/libs -type f -name "*.dylib" -exec codesign --force -s - {} \;

          echo "=== 校验（架构 + 能力）==="
          file ffmpeg_bundle/ffmpeg
          ffmpeg_bundle/ffmpeg -hide_banner -version | head -1
          ffmpeg_bundle/ffmpeg -hide_banner -filters  | grep -q ' subtitles ' || { echo "❌ 缺少 subtitles 滤镜(libass)"; exit 1; }
          for enc in prores_ks libvpx-vp9 qtrle libx264; do
            ffmpeg_bundle/ffmpeg -hide_banner -encoders | grep -q "$enc" || { echo "❌ 缺少 $enc 编码器"; exit 1; }
          done
          echo "✅ arm64 ffmpeg（自带依赖）就绪"

      - name: PyInstaller 打包为独立 .app（内置 ffmpeg + 依赖）
        run: |
          set -e
          pyinstaller --onefile --windowed \
            --name "滚动字幕生成器" \
            --add-binary "ffmpeg_bundle/ffmpeg:." \
            --add-data "ffmpeg_bundle/libs:libs" \
            --noconfirm --clean \
            字幕.py
          echo "=== dist 产物 ==="
          ls -la dist

      - name: 对 .app 做整体 ad-hoc 签名
        run: |
          set -e
          codesign --force --deep -s - "dist/滚动字幕生成器.app" || true
          codesign --verify --deep --strict "dist/滚动字幕生成器.app" && echo "签名校验通过" || echo "签名校验有警告（不影响本机右键打开运行）"

      - name: 打包 .app 为 zip
        run: |
          set -e
          cd dist
          zip -r -y "滚动字幕生成器-macos-arm64.zip" "滚动字幕生成器.app"
          ls -la

      - name: 上传构建产物（在 Actions 运行页底部下载）
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-arm64
          path: dist/滚动字幕生成器-macos-arm64.zip
          if-no-files-found: error
