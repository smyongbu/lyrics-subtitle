name: Build macOS App

# 手动触发（Actions 页点 "Run workflow"），或推送 v 开头的 tag 时自动构建
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-macos:
    # Apple 芯片(arm64)运行器，产出 arm64 原生 .app（仅 M 系列 Mac 可运行）
    runs-on: macos-14

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python (arm64)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: 下载 arm64 静态 ffmpeg（含 libass，自包含单文件）
        run: |
          set -e
          # Martin Riedl 的 macOS 静态构建：含 libass/libvpx/libx264 等全套，单文件无外部依赖
          URL="https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release/ffmpeg.zip"
          echo "下载: $URL"
          curl -fL -o ffmpeg.zip "$URL"
          unzip -o ffmpeg.zip
          test -f ffmpeg
          chmod +x ffmpeg
          # arm64 需要有效签名，做一次 ad-hoc 签名（无害）
          codesign --force -s - ffmpeg || true

          echo "=== 校验（架构 + 能力）==="
          file ffmpeg
          ./ffmpeg -hide_banner -version | head -1
          ./ffmpeg -hide_banner -filters  | grep -q ' subtitles ' || { echo "❌ 缺少 subtitles 滤镜(libass)"; exit 1; }
          for enc in prores_ks libvpx-vp9 qtrle libx264; do
            ./ffmpeg -hide_banner -encoders | grep -q "$enc" || { echo "❌ 缺少 $enc 编码器"; exit 1; }
          done
          echo "✅ arm64 静态 ffmpeg 就绪"

      - name: PyInstaller 打包为独立 .app（内置 ffmpeg）
        run: |
          set -e
          pyinstaller --onefile --windowed \
            --name "滚动字幕生成器" \
            --add-binary "ffmpeg:." \
            --noconfirm --clean \
            字幕.py
          echo "=== dist 产物 ==="
          ls -la dist

      - name: 对 .app 做整体 ad-hoc 签名
        run: |
          set -e
          codesign --force --deep -s - "dist/滚动字幕生成器.app" || true
          codesign --verify --deep --strict "dist/滚动字幕生成器.app" && echo "签名校验通过" || echo "签名有警告（不影响本机右键打开运行）"

      - name: 打包 .app 为 zip
        run: |
          set -e
          cd dist
          zip -r -y "滚动字幕生成器-macos-arm64.zip" "滚动字幕生成器.app"
          ls -la

      - name: 上传构建产物（在 Actions 运行页底部下载）
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-arm64
          path: dist/滚动字幕生成器-macos-arm64.zip
          if-no-files-found: error
